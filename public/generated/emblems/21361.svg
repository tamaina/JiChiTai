<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" 
  "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="500" height="500" viewBox="-8 -8 16 16" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1">
  <desc>Emblem of Tarui, Gifu</desc>
  <g id="g1" stroke="#3f47cd" stroke-width="2">
    <line x1="-7" x2="7" />
    <line id="l" x1="4" y1="-3" x2="4" y2="3" />
    <use xlink:href="#l" transform="scale(-1,1)" />
  </g>
  <use xlink:href="#g1" transform="rotate(90)" />
</svg>